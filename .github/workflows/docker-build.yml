name: Build Docker Image from iVentoy Release

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

env:
  VENTOY_VERSION: v1.0.37
  # 请将下面镜像名改为你自己的 Docker Hub 用户名/镜像名
  DOCKER_IMAGE: zhengyd0720/iventoy

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -------------- 登录 Docker Hub（使用与你现有 CI 一致的 secret 名称） --------------
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        # 如果同时想推送到 ghcr.io，可取消下面注释
        # - name: Log in to GitHub Container Registry
        #   uses: docker/login-action@v3
        #   with:
        #     registry: ghcr.io
        #     username: ${{ github.actor }}
        #     password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get release asset URL
        id: get_asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_DATA=$(curl -s \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/ventoy/PXE/releases/tags/${{ env.VENTOY_VERSION }})
          
          DOWNLOAD_URL=$(echo "$RELEASE_DATA" | jq -r \
            '.assets[] | select(.name | test("linux-x86_64-free\\.tar\\.gz$")) | .browser_download_url')
          
          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
            echo "Error: No linux-x86_64-free asset found for version ${{ env.VENTOY_VERSION }}"
            exit 1
          fi
          
          echo "url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT
          echo "Found asset: $DOWNLOAD_URL"

      - name: Download iVentoy tarball
        run: |
          curl -L -o iventoy.tar.gz "${{ steps.get_asset.outputs.url }}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ env.VENTOY_VERSION }}
          file: Dockerfile
